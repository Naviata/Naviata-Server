// Default server parameters.
hostname = "Hardcore Naviata Server";           // Server name
description = "A vanilla Naviata server.";	    // Description of the server. Gets displayed to users in client server browser.
maxPlayers = 60;                                // Maximum amount of players
password = "";                                  // Password to connect to the server
passwordAdmin = "dev";                          // Password to become a server admin
verifySignatures = 2;                           // Verifies .pbos against .bisign files. (only 2 is supported)
forceSameBuild = 1;                             // When enabled, the server will allow the connection only to clients with same the .exe revision as the server (value 0-1)
vonCodecQuality = 20;                           // Voice over network codec quality, the higher the better (values 0-30)
disableVoN = 0;                                 // Enable/disable voice over network (value 0-1)
disable3rdPerson=1;                             // Toggles the 3rd person view for players (value 0-1)
disableCrosshair=0;                             // Toggles the cross-hair (value 0-1)
guaranteedUpdates=1;                            // Communication protocol used with game server (use only number 1)
loginQueueConcurrentPlayers=5;                  // The number of players concurrently processed during the login process. Should prevent massive performance drop during connection when a lot of people are connecting at the same time.
loginQueueMaxPlayers=500;                       // The maximum number of players that can wait in login queue
enableWhitelist = 0;                            // Enable/disable whitelist (value 0-1)
storageAutoFix = 1;                             // Checks if the persistence files are corrupted and replaces corrupted ones with empty ones (value 0-1)
shardId = "123abc";			                    // Six alphanumeric characters for Private server
instanceId = 1;

// Naviata server parameters.
serverTime="2023/03/12/10/00";                  // Initial in-game time of the server. "SystemTime" means the local time of the machine. Another possibility is to set the time to some value in "YYYY/MM/DD/HH/MM" format, f.e. "2015/4/8/17/23" .
serverTimeAcceleration=2.5;                     // Accelerated Time (value 0-24)// This is a time multiplier for in-game time. In this case, the time would move 24 times faster than normal, so an entire day would pass in one hour.
serverNightTimeAcceleration=9;                  // Accelerated Nigh Time - The numerical value being a multiplier (0.1-64) and also multiplied by serverTimeAcceleration value. Thus, in case it is set to 4 and serverTimeAcceleration is set to 2, night time would move 8 times faster than normal. An entire night would pass in 3 hours.
serverTimePersistent=1;                         // Persistent Time (value 0-1)// The actual server time is saved to storage, so when active, the next server start will use the saved time value.
disablePersonalLight = 1;                       // Disables personal light for all clients connected to server
lightingConfig = 0;                             // 0 for brighter night setup, 1 for darker night setup
defaultVisibility = 4000;
defaultObjectViewDistance = 3500;

class Missions
{
    class DayZ
    {
        template="hardcore_server.Naviata";
    };
};